<!doctype html>
<html lang="en" id="html-root">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI &amp; Applications Lab — Slack Style (Preview)</title>
  <meta name="description" content="Design comparison page based on the Slack design language." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --primary:#4a154b; --primary-press:#611f69; --primary-tint:#592466;
      --on-primary:#fff; --ink:#1d1d1d; --ink-mute:#696969;
      --link-blue:#1264a3; --link-hover:#3860be;
      --canvas:#fff; --cream:#f4ede4; --lavender:#f9f0ff;
      --aubergine:#4a154b; --hairline:#e6e6e6; --on-aub-mute:#d9bdde;
      --r-sm:4px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-pill:90px;
      --max:1240px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",system-ui,-apple-system,sans-serif;color:var(--ink);font-size:16px;line-height:1.55;background:var(--canvas);-webkit-font-smoothing:antialiased}
    img{max-width:100%;display:block}
    a{color:var(--link-blue);text-decoration:none}
    a:hover{color:var(--link-hover);text-decoration:underline}
    h1,h2,h3,h4{font-weight:700;letter-spacing:-.02em;line-height:1.15}

    /* Nav */
    .nav{display:flex;align-items:center;gap:24px;padding:16px 24px;max-width:var(--max);margin:0 auto}
    .nav .brand{font-weight:700;font-size:20px;color:var(--primary);letter-spacing:-.02em}
    .nav .brand img{height:26px;display:inline-block;vertical-align:middle}
    .nav-links{display:flex;gap:24px;margin-left:24px;flex:1}
    .nav-links a{color:var(--ink);font-size:16px;font-weight:600}
    .nav-links a:hover{color:var(--primary);text-decoration:none}
    .nav-cta{display:flex;gap:10px}

    .btn{display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-pill);font-weight:700;font-size:16px;letter-spacing:.2px;cursor:pointer;border:2px solid transparent;transition:.15s;white-space:nowrap}
    .btn-primary{background:var(--primary);color:#fff;padding:14px 28px}
    .btn-primary:hover{background:var(--primary-press);text-decoration:none;color:#fff}
    .btn-secondary{background:var(--lavender);color:var(--ink);padding:10px 30px}
    .btn-secondary:hover{text-decoration:none;color:var(--ink)}
    .btn-outline{background:var(--canvas);color:var(--primary);border-color:var(--primary);padding:14px 28px}
    .btn-outline:hover{text-decoration:none}
    .btn-outline-light{background:transparent;color:#fff;border-color:#fff;padding:14px 28px}
    .btn-outline-light:hover{text-decoration:none;color:#fff}

    /* Hero with pastel-mesh gradient */
    .hero{position:relative;overflow:hidden;padding:96px 24px 110px;text-align:center;background:var(--cream)}
    .hero::before{content:"";position:absolute;inset:-20%;z-index:0;
      background:
        radial-gradient(40% 50% at 20% 25%, #ffd9c2cc 0%, transparent 60%),
        radial-gradient(45% 55% at 80% 20%, #e9d8ffcc 0%, transparent 60%),
        radial-gradient(50% 60% at 65% 80%, #d6ead2cc 0%, transparent 60%),
        radial-gradient(40% 50% at 15% 85%, #ffe9d6aa 0%, transparent 60%);
      filter:blur(20px)}
    .hero-inner{position:relative;z-index:1;max-width:880px;margin:0 auto}
    .eyebrow{font-size:12px;font-weight:700;letter-spacing:.96px;text-transform:uppercase;color:var(--primary);margin-bottom:18px}
    .hero h1{font-size:64px;font-weight:700;letter-spacing:-.768px;line-height:1.12;margin-bottom:20px}
    .hero p{font-size:18px;color:var(--ink-mute);max-width:640px;margin:0 auto 32px}
    .hero-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
    .hero-mock{position:relative;z-index:1;max-width:920px;margin:56px auto 0;border-radius:var(--r-lg);box-shadow:rgba(0,0,0,.1) 0 0 32px 0;aspect-ratio:16/9;object-fit:cover;background:#fff}

    /* Sections */
    .section{max-width:var(--max);margin:0 auto;padding:80px 24px}
    .section-head{text-align:center;max-width:720px;margin:0 auto 48px}
    .section-head h2{font-size:50px;letter-spacing:-.6px;line-height:1.12;margin-bottom:16px}
    .section-head p{font-size:18px;color:var(--ink-mute)}

    /* Pillar cards */
    .pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .pillar{background:var(--cream);border-radius:var(--r-xl);padding:32px;display:flex;flex-direction:column;gap:14px}
    .pillar img{border-radius:var(--r-md);aspect-ratio:16/10;object-fit:cover;background:#fff;margin-bottom:6px}
    .pillar h3{font-size:24px;letter-spacing:-.096px}
    .pillar p{color:var(--ink-mute);font-size:16px;flex:1}
    .pillar .more{color:var(--link-blue);font-weight:700;font-size:16px}

    /* Stats */
    .stats-band{background:var(--lavender)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:var(--max);margin:0 auto;padding:72px 24px}
    .stat{background:#fff;border-radius:var(--r-xl);padding:32px;text-align:center;border:1px solid var(--hairline)}
    .stat .num{font-size:50px;font-weight:700;letter-spacing:-.6px;color:var(--primary);line-height:1}
    .stat .cap{margin-top:10px;color:var(--ink-mute);font-size:14px}

    /* Publications preview */
    .pub-list{display:flex;flex-direction:column;gap:14px;max-width:880px;margin:0 auto}
    .pub{background:#fff;border:1px solid var(--hairline);border-radius:var(--r-lg);padding:24px 28px}
    .pub .meta{font-size:12px;font-weight:700;letter-spacing:.96px;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px}
    .pub h4{font-size:18px;font-weight:600;letter-spacing:-.0216px;margin-bottom:6px}
    .pub .auth{font-size:14px;color:var(--ink-mute)}
    .pub .venue{font-size:14px;color:var(--ink-mute);margin-top:2px}
    .pub .note{display:inline-block;margin-top:8px;font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--primary);background:var(--lavender);border-radius:var(--r-pill);padding:4px 12px}

    /* People */
    .people-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
    .person{text-align:center}
    .person .ava{width:96px;height:96px;border-radius:50%;object-fit:cover;margin:0 auto 14px;background:var(--cream)}
    .person .ava-init{width:96px;height:96px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;margin:0 auto 14px}
    .person h4{font-size:18px;letter-spacing:-.0216px}
    .person p{font-size:14px;color:var(--ink-mute)}

    /* Aubergine closing band */
    .band{background:var(--aubergine);color:#fff;text-align:center;padding:96px 24px}
    .band-inner{max-width:720px;margin:0 auto}
    .band h2{font-size:50px;letter-spacing:-.6px;line-height:1.12;margin-bottom:18px}
    .band p{color:var(--on-aub-mute);font-size:18px;margin-bottom:32px}

    /* Footer */
    .footer{background:var(--aubergine);color:#fff;padding:48px 24px 32px;border-top:1px solid var(--primary-tint)}
    .footer-inner{max-width:var(--max);margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px}
    .footer h5{font-size:12px;font-weight:700;letter-spacing:.96px;text-transform:uppercase;color:#fff;margin-bottom:14px}
    .footer a,.footer p{color:var(--on-aub-mute);font-size:14px;display:block;margin-bottom:8px}
    .footer a:hover{color:#fff}
    .footer-legal{max-width:var(--max);margin:32px auto 0;padding-top:20px;border-top:1px solid var(--primary-tint);font-size:12px;color:var(--on-aub-mute)}

    .compare-badge{position:fixed;bottom:16px;left:16px;z-index:50;background:var(--ink);color:#fff;padding:10px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:700;box-shadow:rgba(0,0,0,.2) 0 1px 10px 0}
    .compare-badge a{color:#fff;text-decoration:underline}

    @media(max-width:1023px){
      .pillars{grid-template-columns:1fr 1fr}
      .people-grid{grid-template-columns:1fr 1fr}
      .stats{grid-template-columns:1fr}
    }
    @media(max-width:768px){
      .hero h1{font-size:40px;letter-spacing:-.4px}
      .section-head h2,.band h2{font-size:32px;letter-spacing:-.256px}
      .pillars,.people-grid{grid-template-columns:1fr}
      .nav-links{display:none}
      .footer-inner{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="#"><img src="assets/logo_icon.png" alt="" onerror="this.style.display='none'"> AI &amp; Applications Lab</a>
      <div class="nav-links">
        <a href="index.html#/research">Research</a>
        <a href="index.html#/projects">Projects</a>
        <a href="index.html#/people">People</a>
        <a href="index.html#/publications">Publications</a>
      </div>
      <div class="nav-cta">
        <a class="btn btn-secondary" href="index.html">Classic site</a>
        <a class="btn btn-primary" href="index.html#/join">Join the Lab</a>
      </div>
    </nav>
  </header>

  <main id="slack-app"></main>

  <div class="compare-badge">Slack-style preview · <a href="index.html">back to classic</a></div>

  <script src="script.js"></script>
  <script>
    // script.js exposes `data`, `L`, and `TR` as globals. Its own DOMContentLoaded
    // init aborts harmlessly here (no #year/#app elements), so we render our own.
    (function () {
      function ready(fn){ document.readyState!=='loading' ? fn() : document.addEventListener('DOMContentLoaded', fn); }
      ready(function () {
        if (typeof data === 'undefined') { document.getElementById('slack-app').innerHTML = '<p style="padding:40px;text-align:center">Could not load lab data.</p>'; return; }
        const tr = (typeof L === 'function') ? L : (o => (o && (o.en||o)) || '');

        const research = data.research || [];
        const people = (data.people || []);
        const pi = people.filter(p => p.category === 'pi');
        const phd = people.filter(p => p.category === 'phd');
        const headPeople = [...pi, ...phd].slice(0, 4);
        const pubCount = (data.publications || []).length;
        const internCount = people.filter(p => p.category === 'intern').length;

        // Pending papers first, then a few recent
        const isPending = p => /under\s*(review|revision|preparation)|in\s*preparation/i.test((p.note||'') + (p.venue||''));
        const pubs = [...(data.publications||[])].sort((a,b)=>isPending(b)-isPending(a)).slice(0,4);

        const pillarCards = research.map(r => `
          <article class="pillar">
            <img src="${r.image}" alt="" onerror="this.style.visibility='hidden'">
            <h3>${tr(r.title)}</h3>
            <p>${tr(r.short)}</p>
            <a class="more" href="index.html#/projects/${r.slug}">Explore →</a>
          </article>`).join('');

        const pubRows = pubs.map(p => `
          <div class="pub">
            <div class="meta">${(p.cat||'').replace(/-/g,' ')} · ${p.year||''}</div>
            <h4>${p.title}</h4>
            <div class="auth">${p.authors||''}</div>
            <div class="venue">${p.venue||''}</div>
            ${p.note ? `<span class="note">${p.note}</span>` : ''}
          </div>`).join('');

        const peopleCards = headPeople.map(p => {
          const ava = p.image
            ? `<img class="ava" src="${p.image}" alt="" onerror="this.outerHTML='<div class=\\'ava-init\\'>${(tr(p.name)||'?').charAt(0)}</div>'">`
            : `<div class="ava-init">${(tr(p.name)||'?').charAt(0)}</div>`;
          return `<div class="person">${ava}<h4>${tr(p.name)}</h4><p>${tr(p.role)}</p></div>`;
        }).join('');

        document.getElementById('slack-app').innerHTML = `
          <section class="hero">
            <div class="hero-inner">
              <p class="eyebrow">Myongji University · Convergence Software</p>
              <h1>AI systems for real-world applications.</h1>
              <p>We build and evaluate AI systems across game &amp; interactive media, olfactory generation, biometric sensing, and language-model evaluation.</p>
              <div class="hero-cta">
                <a class="btn btn-primary" href="index.html#/projects">Explore projects</a>
                <a class="btn btn-secondary" href="index.html#/join">Prospective students</a>
              </div>
            </div>
            <img class="hero-mock" src="assets/myongji-home.png" alt="" onerror="this.style.display='none'">
          </section>

          <section class="section">
            <div class="section-head">
              <h2>Research areas</h2>
              <p>Three research pillars united by a shared focus on building and evaluating multimodal systems.</p>
            </div>
            <div class="pillars">${pillarCards}</div>
          </section>

          <section class="stats-band">
            <div class="stats">
              <div class="stat"><div class="num">3</div><div class="cap">Research pillars</div></div>
              <div class="stat"><div class="num">${pubCount}</div><div class="cap">Publications &amp; patents</div></div>
              <div class="stat"><div class="num">${internCount}</div><div class="cap">Research interns</div></div>
            </div>
          </section>

          <section class="section">
            <div class="section-head">
              <h2>Recent publications</h2>
              <p>Selected journals, conference papers, and works in progress.</p>
            </div>
            <div class="pub-list">${pubRows}</div>
          </section>

          <section class="section">
            <div class="section-head">
              <h2>People</h2>
              <p>Graduate researchers and the lab's principal investigator.</p>
            </div>
            <div class="people-grid">${peopleCards}</div>
          </section>

          <section class="band">
            <div class="band-inner">
              <h2>Build applied AI that people can use, sense, and evaluate.</h2>
              <p>We welcome motivated students and collaborators interested in applied AI systems.</p>
              <a class="btn btn-outline-light" href="index.html#/contact">Contact the PI</a>
            </div>
          </section>

          <footer class="footer">
            <div class="footer-inner">
              <div>
                <h5>AI &amp; Applications Lab</h5>
                <p>Department of Convergence Software, Myongji University.</p>
              </div>
              <div>
                <h5>Research</h5>
                <a href="index.html#/projects/game-ai">Game &amp; Interactive AI</a>
                <a href="index.html#/projects/olfactory-ai">Olfactory AI</a>
                <a href="index.html#/projects/applied-ai">Applied AI</a>
              </div>
              <div>
                <h5>Resources</h5>
                <a href="index.html#/publications">Publications</a>
                <a href="index.html#/gallery">Gallery</a>
                <a href="index.html#/join">Prospective Students</a>
              </div>
              <div>
                <h5>Contact</h5>
                <a href="mailto:harrykim@mju.ac.kr">harrykim@mju.ac.kr</a>
              </div>
            </div>
            <div class="footer-legal">© ${new Date().getFullYear()} AI &amp; Applications Lab.</div>
          </footer>`;
      });
    })();
  </script>
</body>
</html>
